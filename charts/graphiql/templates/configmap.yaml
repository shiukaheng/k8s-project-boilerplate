apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head>
        <title>GraphiQL — Hasura</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="https://unpkg.com/graphiql@3/graphiql.min.css" />
        <style>
          body { margin: 0; }
          #graphiql { height: 100vh; }
        </style>
      </head>
      <body>
        <div id="graphiql"></div>
        <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/graphiql@3/graphiql.min.js"></script>
        <script>
          const ENDPOINT = "{{ .Values.graphql.endpoint }}";
          const ADMIN_SECRET = "{{ .Values.graphql.adminSecret }}";

          const fetcher = GraphiQL.createFetcher({
            url: ENDPOINT,
            headers: { "X-Hasura-Admin-Secret": ADMIN_SECRET },
          });

          const root = ReactDOM.createRoot(document.getElementById("graphiql"));
          root.render(
            React.createElement(GraphiQL, {
              fetcher: fetcher,
              defaultEditorToolsVisibility: true,
              defaultQuery: [
                "# GraphiQL connected to Hasura at " + ENDPOINT,
                "# Admin secret pre-configured as a header.",
                "#",
                "# Tip: use Ctrl+Space for autocomplete, Ctrl+Enter to run.",
                "",
                "query IntrospectionTypes {",
                "  __schema {",
                "    types {",
                "      name",
                "      kind",
                "    }",
                "  }",
                "}",
              ].join("\n"),
            })
          );
        </script>
      </body>
    </html>
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
