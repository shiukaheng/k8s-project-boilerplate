# Use existing PostgreSQL instead of deploying a new one
postgres:
  enabled: false

# Hasura secrets
secret:
  adminSecret: "hasura"
  # Database URL for application data (separate from metadata DB)
  extraSecrets:
    HASURA_GRAPHQL_DATABASE_URL: "postgres://postgres:password@postgres-postgresql:5432/postgres"

# Enable console for development
config:
  enableConsole: true
  devMode: true
  metadataOnly: false  # Use this DB for both metadata AND application data

# Expose port for console
service:
  port: 8081
  targetPort: 8080

# Health check
healthChecks:
  enabled: true

# Declarative metadata — applied on every container start via replace_metadata API.
# Paste the output of Hasura Console "Export metadata" (JSON) here.
# The pod will automatically roll whenever this value changes (checksum annotation).
metadataJson: |
  {
    "resource_version": 7,
    "metadata": {
      "version": 3,
      "sources": [
        {
          "name": "default",
          "kind": "postgres",
          "tables": [
            {
              "table": {
                "name": "edges",
                "schema": "public"
              },
              "object_relationships": [
                {
                  "name": "node",
                  "using": {
                    "manual_configuration": {
                      "column_mapping": {
                        "child": "id",
                        "user_id": "user_id"
                      },
                      "insertion_order": null,
                      "remote_table": {
                        "name": "nodes",
                        "schema": "public"
                      }
                    }
                  }
                },
                {
                  "name": "nodeByUserIdParent",
                  "using": {
                    "manual_configuration": {
                      "column_mapping": {
                        "parent": "id",
                        "user_id": "user_id"
                      },
                      "insertion_order": null,
                      "remote_table": {
                        "name": "nodes",
                        "schema": "public"
                      }
                    }
                  }
                },
                {
                  "name": "user",
                  "using": {
                    "foreign_key_constraint_on": "user_id"
                  }
                }
              ]
            },
            {
              "table": {
                "name": "nodes",
                "schema": "public"
              },
              "object_relationships": [
                {
                  "name": "user",
                  "using": {
                    "foreign_key_constraint_on": "user_id"
                  }
                }
              ],
              "array_relationships": [
                {
                  "name": "edges",
                  "using": {
                    "manual_configuration": {
                      "column_mapping": {
                        "id": "child",
                        "user_id": "user_id"
                      },
                      "insertion_order": null,
                      "remote_table": {
                        "name": "edges",
                        "schema": "public"
                      }
                    }
                  }
                },
                {
                  "name": "edgesByParentUserId",
                  "using": {
                    "manual_configuration": {
                      "column_mapping": {
                        "id": "parent",
                        "user_id": "user_id"
                      },
                      "insertion_order": null,
                      "remote_table": {
                        "name": "edges",
                        "schema": "public"
                      }
                    }
                  }
                }
              ]
            },
            {
              "table": {
                "name": "users",
                "schema": "public"
              },
              "array_relationships": [
                {
                  "name": "edges",
                  "using": {
                    "foreign_key_constraint_on": {
                      "column": "user_id",
                      "table": {
                        "name": "edges",
                        "schema": "public"
                      }
                    }
                  }
                },
                {
                  "name": "nodes",
                  "using": {
                    "foreign_key_constraint_on": {
                      "column": "user_id",
                      "table": {
                        "name": "nodes",
                        "schema": "public"
                      }
                    }
                  }
                }
              ]
            }
          ],
          "configuration": {
            "connection_info": {
              "database_url": {
                "from_env": "HASURA_GRAPHQL_DATABASE_URL"
              },
              "isolation_level": "read-committed",
              "pool_settings": {
                "connection_lifetime": 600,
                "idle_timeout": 180,
                "max_connections": 50,
                "retries": 1
              },
              "use_prepared_statements": true
            }
          }
        }
      ]
    }
  }
